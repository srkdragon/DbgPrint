name: Build DbgPrint

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2019  # Use Windows 2019 for better compatibility
    
    strategy:
      matrix:
        configuration: [Debug, Release]
        platform: [x64, Win32]
        
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
        
    - name: Install WTL
      shell: cmd
      run: |
        mkdir C:\WTL
        cd C:\WTL
        curl -L -o wtl.zip https://sourceforge.net/projects/wtl/files/latest/download
        tar -xf wtl.zip
        dir /s
        
    - name: Patch project files for WTL path
      shell: pwsh
      run: |
        $wtlPath = "C:\WTL\WTL10_10320_Release\include"
        if (Test-Path "C:\WTL\include") {
          $wtlPath = "C:\WTL\include"
        }
        
        # Find the actual WTL include path
        $wtlInclude = Get-ChildItem -Path "C:\WTL" -Recurse -Filter "atlapp.h" | Select-Object -First 1
        if ($wtlInclude) {
          $wtlPath = $wtlInclude.DirectoryName
          Write-Host "Found WTL at: $wtlPath"
        }
        
        # Create Directory.Build.props to inject WTL path
        @"
        <Project>
          <PropertyGroup>
            <WTLPath>$wtlPath</WTLPath>
            <IncludePath>$(WTLPath);$(IncludePath)</IncludePath>
          </PropertyGroup>
        </Project>
        "@ | Out-File -FilePath "Directory.Build.props" -Encoding UTF8
        
        # Also modify the project files directly if needed
        $vcxprojFiles = Get-ChildItem -Recurse -Filter "*.vcxproj"
        foreach ($file in $vcxprojFiles) {
          $content = Get-Content $file.FullName -Raw
          # Add WTL path to AdditionalIncludeDirectories if not present
          if (-not $content.Contains("`$(WTLPath)")) {
            $content = $content -replace '(<AdditionalIncludeDirectories>)([^<]*)', "`$1`$(WTLPath);`$2"
            Set-Content -Path $file.FullName -Value $content -NoNewline
          }
        }
        
    - name: Build solution
      run: msbuild DbgPrint.sln /p:Configuration=${{ matrix.configuration }} /p:Platform=${{ matrix.platform }} /m
      
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: DbgPrint-${{ matrix.configuration }}-${{ matrix.platform }}
        path: |
          ${{ matrix.platform }}/${{ matrix.configuration }}/*.exe
          ${{ matrix.platform }}/${{ matrix.configuration }}/*.pdb
