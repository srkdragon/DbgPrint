name: Build DbgPrint

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Install dependencies via NuGet
        run: |
          nuget install WTL                                -Version 10.0.10320 -OutputDirectory "$env:TEMP\nuget"
          nuget install Microsoft.Windows.ImplementationLibrary -OutputDirectory "$env:TEMP\nuget"
          nuget install Microsoft.Detours                  -OutputDirectory "$env:TEMP\nuget"
        shell: pwsh

      - name: Inject includes via Directory.Build.props
        run: |
          $nuget = "$env:TEMP\nuget"

          $wtl     = (Get-ChildItem $nuget -Recurse -Filter "atlapp.h"   | Select-Object -First 1).DirectoryName
          $wil     = (Get-ChildItem $nuget -Recurse -Filter "resource.h" | Where-Object FullName -like "*wil*" | Select-Object -First 1).DirectoryName
          # Detours header lives at <root>/include/detours/detours.h — we want <root>/include
          $detours = (Get-ChildItem $nuget -Recurse -Filter "detours.h"  | Select-Object -First 1).DirectoryName |
                       Split-Path -Parent

          Write-Host "WTL:     $wtl"
          Write-Host "WIL:     $wil"
          Write-Host "Detours: $detours"

          $props = @"
          <Project>
            <ItemDefinitionGroup>
              <ClCompile>
                <AdditionalIncludeDirectories>$wtl;$wil;$detours;%(AdditionalIncludeDirectories)</AdditionalIncludeDirectories>
                <LanguageStandard>stdcpp20</LanguageStandard>
              </ClCompile>
            </ItemDefinitionGroup>
          </Project>
          "@

          $props | Set-Content -Path "$env:GITHUB_WORKSPACE\Directory.Build.props" -Encoding UTF8
        shell: pwsh

      - name: Build Release x64
        run: |
          msbuild DbgPrint.sln `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /m `
            /nologo `
            /verbosity:minimal

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: DbgPrint-x64-Release
          path: |
            x64/Release/*.exe
            x64/Release/*.dll
            x64/Release/*.pdb
          if-no-files-found: error
          retention-days: 30
