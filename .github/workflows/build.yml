name: Build DbgPrint

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Install WTL via NuGet
        run: |
          nuget install WTL -Version 10.0.10320 -OutputDirectory "$env:TEMP\nuget"
          $wtl = (Get-ChildItem "$env:TEMP\nuget" -Recurse -Filter "atlapp.h" | Select-Object -First 1).DirectoryName
          echo "WTL_INCLUDE=$wtl" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Install WIL and Detours via vcpkg
        run: |
          vcpkg install wil:x64-windows detours:x64-windows
          $vcpkgInclude = "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows\include"
          echo "VCPKG_INCLUDE=$vcpkgInclude" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Write Directory.Build.props
        run: |
          $xml  = '<Project>'
          $xml += '<ItemDefinitionGroup>'
          $xml += '<ClCompile>'
          $xml += "<AdditionalIncludeDirectories>$env:WTL_INCLUDE;$env:VCPKG_INCLUDE;%(AdditionalIncludeDirectories)</AdditionalIncludeDirectories>"
          $xml += '</ClCompile>'
          $xml += '</ItemDefinitionGroup>'
          $xml += '</Project>'
          Set-Content "$env:GITHUB_WORKSPACE\Directory.Build.props" $xml -Encoding UTF8
        shell: pwsh

      - name: Write Directory.Build.targets
        run: |
          $xml  = '<Project>'
          $xml += '<ItemDefinitionGroup>'
          $xml += '<ClCompile>'
          $xml += '<LanguageStandard>stdcpp20</LanguageStandard>'
          $xml += '</ClCompile>'
          $xml += '</ItemDefinitionGroup>'
          $xml += '</Project>'
          Set-Content "$env:GITHUB_WORKSPACE\Directory.Build.targets" $xml -Encoding UTF8
        shell: pwsh

      - name: Build Release x64
        run: |
          msbuild DbgPrint.sln `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /m `
            /nologo `
            /verbosity:minimal

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: DbgPrint-x64-Release
          path: |
            x64/Release/*.exe
            x64/Release/*.dll
            x64/Release/*.pdb
          if-no-files-found: error
          retention-days: 30
